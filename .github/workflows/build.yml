name: Build FAKE GPS DEB

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**.mm'
      - '**.xm'
      - '**.plist'
      - 'Makefile'
      - 'control'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]

concurrency:
  group: fake-gps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash curl git make perl build-essential fakeroot xz-utils unzip libplist-utils

      - name: Verify project integration
        shell: bash
        run: |
          set -euo pipefail
          required=(Makefile control FakeGPS.mm gpsq.plist)
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
            echo "Found: $file"
          done
          grep -q 'gpsq_FILES.*FakeGPS.mm' Makefile
          grep -q 'TWEAK_NAME.*gpsq' Makefile
          grep -q 'com.apple.springboard' gpsq.plist

      - name: Install Theos toolchain and SDK
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$THEOS"
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          test -x "$THEOS/toolchain/linux/iphone/bin/clang"
          test -n "$(find "$THEOS/sdks" -maxdepth 1 -type d -name '*.sdk' -print -quit)"
          "$THEOS/toolchain/linux/iphone/bin/clang" --version

      - name: Build rootless package
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          make clean
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless messages=yes -j1 2>&1 | tee artifacts/build.log
          status=${PIPESTATUS[0]}
          echo ""
          echo "========== BUILD ERRORS =========="
          grep -nE 'error:|fatal error:|Undefined symbols|duplicate symbol|ld:|make\[[0-9]+\]: \*\*\*' artifacts/build.log || true
          echo "=================================="
          exit "$status"

      - name: Collect package
        if: success()
        shell: bash
        run: |
          find packages -type f -name '*.deb' -exec cp -v {} artifacts/ \;
          test -n "$(find artifacts -maxdepth 1 -type f -name '*.deb' -print -quit)"
          sha256sum artifacts/*.deb > artifacts/SHA256SUMS.txt
          ls -lah artifacts

      - name: Upload build files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FAKE-GPS-${{ github.run_number }}
          path: |
            artifacts/*.deb
            artifacts/build.log
            artifacts/SHA256SUMS.txt
          if-no-files-found: warn
          retention-days: 30
