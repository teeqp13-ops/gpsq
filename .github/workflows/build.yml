name: Build GPSQ Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: gpsq-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-tweak:
    name: Build iOS DEB and dylibs
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      THEOS: ${{ github.workspace }}/theos
      THEOS_PACKAGE_SCHEME: rootless
      CI: true
      MAX_BUILD_ATTEMPTS: 3
      RETRY_DELAY_SECONDS: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bash curl git make perl python3 build-essential fakeroot \
            dpkg-dev xz-utils unzip libplist-utils file rsync ca-certificates

      - name: Validate project files
        shell: bash
        run: |
          set -Eeuo pipefail
          required=(
            Makefile
            control
            gpsq.plist
            FakeGPSLocation.plist
            FakeGPS.mm
            SharedBridge.xm
            FeaturePack.xm
            LocationSpoof.xm
            Resources/Info.plist
            scripts/clean.sh
            scripts/validate.sh
            scripts/build.sh
          )

          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file" >&2; exit 1; }
          done

          plistutil -lint Resources/Info.plist
          bash -n scripts/clean.sh
          bash -n scripts/validate.sh
          bash -n scripts/build.sh

      - name: Install Theos toolchain and SDK
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf "$THEOS"
          INSTALLER="$(mktemp)"
          trap 'rm -f "$INSTALLER"' EXIT

          curl --retry 3 --retry-delay 2 --connect-timeout 20 -fsSL \
            https://raw.githubusercontent.com/theos/theos/master/bin/install-theos \
            -o "$INSTALLER"

          chmod +x "$INSTALLER"
          yes n | bash "$INSTALLER"

          test -f "$THEOS/makefiles/common.mk"
          test -x "$THEOS/toolchain/linux/iphone/bin/clang"

          SDK_PATH="$(find "$THEOS/sdks" -maxdepth 1 -type d -name '*.sdk' -print -quit)"
          test -n "$SDK_PATH"

          "$THEOS/toolchain/linux/iphone/bin/clang" --version
          echo "Using SDK: $SDK_PATH"

      - name: Build rootless tweak
        shell: bash
        run: |
          set -Eeuo pipefail
          bash scripts/build.sh

      - name: Verify iOS outputs
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail

          DEB_COUNT="$(find artifacts -maxdepth 1 -type f -name '*.deb' | wc -l | tr -d ' ')"
          DYLIB_COUNT="$(find artifacts/dylibs -maxdepth 1 -type f -name '*.dylib' | wc -l | tr -d ' ')"

          test "$DEB_COUNT" -ge 1 || { echo 'No DEB package was generated.' >&2; exit 1; }
          test "$DYLIB_COUNT" -ge 2 || { echo "Expected at least 2 dylibs, found $DYLIB_COUNT." >&2; exit 1; }

          find artifacts -type f \( -name '*.deb' -o -name '*.dylib' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > artifacts/IOS_SHA256SUMS.txt

          printf 'status=success\ndeb_count=%s\ndylib_count=%s\n' \
            "$DEB_COUNT" "$DYLIB_COUNT" > artifacts/IOS_BUILD_RESULT.txt

          find artifacts -maxdepth 2 -type f -print

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GPSQ-iOS-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 30

  php-panel:
    name: Build PHP panel DEB
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y php-cli php-sqlite3 sqlite3 dpkg-dev fakeroot

      - name: Validate PHP panel
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f server/build-deb.sh
          test -d server/public
          test -f server/schema.sql
          test -f server/README_AR.md

          bash -n server/build-deb.sh
          find server -type f -name '*.php' -print0 | xargs -0 -r -n1 php -l
          php -r "new PDO('sqlite::memory:'); echo 'SQLite OK'.PHP_EOL;"

      - name: Build PHP panel package
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf artifacts
          mkdir -p artifacts

          bash server/build-deb.sh 2>&1 | tee artifacts/php-panel-build.log

          PANEL_DEB="$(find artifacts -maxdepth 1 -type f -name 'gpsq-panel_*.deb' -print -quit)"
          test -n "$PANEL_DEB" || { echo 'Panel DEB was not generated.' >&2; exit 1; }

          dpkg-deb --info "$PANEL_DEB"
          sha256sum "$PANEL_DEB" > artifacts/PANEL_SHA256SUMS.txt
          printf 'status=success\npackage=%s\n' "$(basename "$PANEL_DEB")" > artifacts/PANEL_BUILD_RESULT.txt

      - name: Upload panel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GPSQ-Panel-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 30
