name: Build GPSQ Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: gpsq-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-tweak:
    name: Build iOS DEB and dylibs
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      THEOS: ${{ github.workspace }}/theos
      THEOS_PACKAGE_SCHEME: rootless

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y bash curl git make perl python3 build-essential fakeroot dpkg-dev xz-utils unzip libplist-utils file

      - name: Validate project
        shell: bash
        run: |
          set -Eeuo pipefail
          for file in Makefile control gpsq.plist FakeGPSLocation.plist FakeGPS.mm SharedBridge.xm FeaturePack.xm LocationSpoof.xm Resources/Info.plist; do
            test -f "$file" || { echo "Missing required file: $file" >&2; exit 1; }
          done
          plistutil -lint Resources/Info.plist
          bash -n scripts/clean.sh
          bash -n scripts/validate.sh
          bash -n scripts/build.sh

      - name: Install Theos toolchain and SDK
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf "$THEOS"
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          test -f "$THEOS/makefiles/common.mk"
          test -x "$THEOS/toolchain/linux/iphone/bin/clang"
          SDK_PATH="$(find "$THEOS/sdks" -maxdepth 1 -type d -name '*.sdk' -print -quit)"
          test -n "$SDK_PATH"
          "$THEOS/toolchain/linux/iphone/bin/clang" --version
          echo "Using SDK: $SDK_PATH"

      - name: Build rootless tweak
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf .theos obj packages artifacts
          mkdir -p artifacts/dylibs artifacts/logs
          set +e
          make clean package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless messages=yes -j1 2>&1 | tee artifacts/logs/ios-build.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            grep -nE 'error:|fatal error:|Undefined symbols|duplicate symbol|ld:|make.*\*\*\*' artifacts/logs/ios-build.log >&2 || true
            exit "$status"
          fi

      - name: Collect outputs
        shell: bash
        run: |
          set -Eeuo pipefail
          find packages -type f -name '*.deb' -exec cp -f {} artifacts/ \;
          find .theos -type f -name '*.dylib' -exec cp -f {} artifacts/dylibs/ \;

          DEB_COUNT="$(find artifacts -maxdepth 1 -type f -name '*.deb' | wc -l | tr -d ' ')"
          DYLIB_COUNT="$(find artifacts/dylibs -type f -name '*.dylib' | wc -l | tr -d ' ')"
          test "$DEB_COUNT" -ge 1
          test "$DYLIB_COUNT" -ge 2

          find artifacts -type f \( -name '*.deb' -o -name '*.dylib' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > artifacts/IOS_SHA256SUMS.txt
          printf 'status=success\ndeb_count=%s\ndylib_count=%s\n' "$DEB_COUNT" "$DYLIB_COUNT" > artifacts/IOS_BUILD_RESULT.txt
          find artifacts -maxdepth 2 -type f -print

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GPSQ-iOS-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 30

  php-panel:
    name: Build PHP panel DEB
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli php-sqlite3 sqlite3 dpkg-dev fakeroot

      - name: Validate and build panel
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n server/build-deb.sh
          find server -type f -name '*.php' -print0 | xargs -0 -r -n1 php -l
          php -r "new PDO('sqlite::memory:'); echo 'SQLite OK'.PHP_EOL;"
          rm -rf artifacts
          mkdir -p artifacts
          bash server/build-deb.sh 2>&1 | tee artifacts/php-panel-build.log
          PANEL_DEB="$(find artifacts -maxdepth 1 -type f -name 'gpsq-panel_*.deb' -print -quit)"
          test -n "$PANEL_DEB"
          dpkg-deb --info "$PANEL_DEB"
          sha256sum "$PANEL_DEB" > artifacts/PANEL_SHA256SUMS.txt
          printf 'status=success\n' > artifacts/PANEL_BUILD_RESULT.txt

      - name: Upload panel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GPSQ-Panel-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 30
