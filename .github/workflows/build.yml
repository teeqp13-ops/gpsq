name: Build GPSQ Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: gpsq-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-tweak:
    name: Build iOS DEB and dylibs
    runs-on: macos-14
    timeout-minutes: 40
    env:
      THEOS: ${{ github.workspace }}/theos
      THEOS_PACKAGE_SCHEME: rootless

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project files
        shell: bash
        run: |
          set -Eeuo pipefail
          for file in Makefile control gpsq.plist FakeGPSLocation.plist FakeGPS.mm SharedBridge.xm FeaturePack.xm LocationSpoof.xm Resources/Info.plist; do
            test -f "$file" || { echo "Missing required file: $file" >&2; exit 1; }
          done
          plutil -lint Resources/Info.plist

      - name: Install Theos using official installer
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf "$THEOS"
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          test -f "$THEOS/makefiles/common.mk"
          test -x "$THEOS/bin/logos.pl"
          xcodebuild -version
          SDK_PATH="$(xcrun --sdk iphoneos --show-sdk-path)"
          test -d "$SDK_PATH"
          echo "Using SDK: $SDK_PATH"

      - name: Build rootless tweak package
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf .theos obj packages artifacts
          mkdir -p artifacts/dylibs artifacts/logs
          make clean || true
          set +e
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless messages=yes -j2 2>&1 | tee artifacts/logs/ios-build.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo 'Detected compiler/linker errors:' >&2
            grep -nE 'error:|fatal error:|Undefined symbols|duplicate symbol|ld:' artifacts/logs/ios-build.log >&2 || true
            exit "$status"
          fi

      - name: Collect and verify iOS outputs
        shell: bash
        run: |
          set -Eeuo pipefail
          find packages -type f -name '*.deb' -exec cp -f {} artifacts/ \;
          find .theos -type f -name '*.dylib' -exec cp -f {} artifacts/dylibs/ \;

          DEB_COUNT="$(find artifacts -maxdepth 1 -type f -name '*.deb' | wc -l | tr -d ' ')"
          DYLIB_COUNT="$(find artifacts/dylibs -type f -name '*.dylib' | wc -l | tr -d ' ')"
          echo "DEB count: $DEB_COUNT"
          echo "dylib count: $DYLIB_COUNT"
          test "$DEB_COUNT" -ge 1
          test "$DYLIB_COUNT" -ge 2

          : > artifacts/IOS_SHA256SUMS.txt
          while IFS= read -r file_path; do
            shasum -a 256 "$file_path" >> artifacts/IOS_SHA256SUMS.txt
          done < <(find artifacts -type f \( -name '*.deb' -o -name '*.dylib' \) -print | LC_ALL=C sort)

          while IFS= read -r dylib; do
            file "$dylib"
            lipo -info "$dylib" || true
          done < <(find artifacts/dylibs -type f -name '*.dylib' -print)

          printf 'status=success\nplatform=macos-14\ndeb_count=%s\ndylib_count=%s\n' "$DEB_COUNT" "$DYLIB_COUNT" > artifacts/IOS_BUILD_RESULT.txt
          find artifacts -maxdepth 2 -type f -print

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GPSQ-iOS-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 30

  php-panel:
    name: Build PHP panel DEB
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP and packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli php-sqlite3 sqlite3 dpkg-dev fakeroot

      - name: Validate PHP panel
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f server/build-deb.sh
          test -f server/schema.sql
          test -f server/public/index.php
          test -f server/public/api/config.php
          bash -n server/build-deb.sh
          find server -type f -name '*.php' -print0 | xargs -0 -r -n1 php -l
          php -r "new PDO('sqlite::memory:'); echo 'SQLite OK'.PHP_EOL;"

      - name: Build panel package
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf artifacts
          mkdir -p artifacts
          bash server/build-deb.sh 2>&1 | tee artifacts/php-panel-build.log
          PANEL_DEB="$(find artifacts -maxdepth 1 -type f -name 'gpsq-panel_*.deb' -print -quit)"
          test -n "$PANEL_DEB"
          dpkg-deb --info "$PANEL_DEB"
          sha256sum "$PANEL_DEB" > artifacts/PANEL_SHA256SUMS.txt
          printf 'status=success\nplatform=ubuntu-22.04\n' > artifacts/PANEL_BUILD_RESULT.txt

      - name: Upload panel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GPSQ-Panel-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 30
