name: Build gpsq DEB

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build gpsq DEB
    runs-on: ubuntu-latest
    env:
      GPSQ_API_BASE: https://ipa.p3nd.fun/server/api
      GPSQ_API_KEY: ${{ secrets.GPSQ_API_KEY }}
o
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Theos
        uses: Randomblock1/theos-action@v1

      - name: Verify project files
        run: |
          set -e
          pwd
          ls -lah
          test -f Makefile
          test -f control
          test -f gpsq.mm
          test -f gpsq.plist
          test -f Filter.plist
          echo "Project files and filter plists are ready"
          if [ -z "$GPSQ_API_KEY" ]; then
            echo "::warning::GPSQ_API_KEY secret is not set. Activation requests will be rejected by the server."
          fi

      - name: Build package
        run: |
          set -e
          make clean || true
          make package FINALPACKAGE=1 GPSQ_API_BASE="$GPSQ_API_BASE" GPSQ_API_KEY="$GPSQ_API_KEY"

      - name: Collect build artifacts
        if: always()
        run: |
          mkdir -p artifacts
          echo "Repository:" > artifacts/build-info.txt
          pwd >> artifacts/build-info.txt
          echo "\nFiles:" >> artifacts/build-info.txt
          find . -maxdepth 4 -type f | sort >> artifacts/build-info.txt
          echo "\nDEB files:" >> artifacts/build-info.txt
          find . -type f -name "*.deb" -not -path "./.git/*" -print | tee artifacts/deb-list.txt
          while IFS= read -r deb; do
            [ -n "$deb" ] && cp -v "$deb" artifacts/
          done < artifacts/deb-list.txt
          ls -lah artifacts | tee -a artifacts/build-info.txt

      - name: Upload DEB Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpsq-DEB-Packages
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30
