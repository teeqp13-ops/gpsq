name: Build GPSQ Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: gpsq-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  THEOS: ${{ github.workspace }}/theos
  MAX_BUILD_ATTEMPTS: 3
  RETRY_DELAY_SECONDS: 3

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash curl git make perl python3 php-cli php-sqlite3 build-essential fakeroot dpkg-dev xz-utils unzip libplist-utils

      - name: Validate scripts and PHP
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n scripts/clean.sh
          bash -n scripts/validate.sh
          bash -n scripts/build.sh
          bash -n server/build-deb.sh
          find server -type f -name '*.php' -print0 | xargs -0 -r -n1 php -l
          php -r "new PDO('sqlite::memory:'); echo 'SQLite OK'.PHP_EOL;"

      - name: Install Theos
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf "$THEOS"
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          test -x "$THEOS/toolchain/linux/iphone/bin/clang"
          test -n "$(find "$THEOS/sdks" -maxdepth 1 -type d -name '*.sdk' -print -quit)"

      - name: Build tweak package
        shell: bash
        run: bash scripts/build.sh

      - name: Build PHP panel package
        shell: bash
        run: bash server/build-deb.sh

      - name: Verify outputs
        shell: bash
        run: |
          set -Eeuo pipefail
          test -n "$(find artifacts -maxdepth 1 -type f -name '*.deb' -print -quit)"
          test -n "$(find artifacts/dylibs -maxdepth 1 -type f -name '*.dylib' -print -quit)"
          find artifacts -maxdepth 2 -type f -print

      - name: Generate checksums
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          find artifacts -type f \( -name '*.deb' -o -name '*.dylib' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > artifacts/ALL_SHA256SUMS.txt

      - name: Upload build files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GPSQ-${{ github.run_number }}
          path: |
            artifacts/**/*.deb
            artifacts/**/*.dylib
            artifacts/**/*.log
            artifacts/**/*SHA256SUMS.txt
            artifacts/**/BUILD_RESULT.txt
          if-no-files-found: warn
          retention-days: 30
