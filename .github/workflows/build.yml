name: Build GPSQ Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**.mm'
      - '**.xm'
      - '**.plist'
      - '**.strings'
      - '**.json'
      - '**.php'
      - 'Makefile'
      - 'control'
      - 'scripts/**'
      - 'server/**'
      - 'Resources/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]

concurrency:
  group: gpsq-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  THEOS: ${{ github.workspace }}/theos
  MAX_BUILD_ATTEMPTS: 5
  RETRY_DELAY_SECONDS: 5

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash curl git make perl python3 php-cli php-sqlite3 build-essential fakeroot xz-utils unzip libplist-utils

      - name: Validate PHP panel
        shell: bash
        run: |
          set -Eeuo pipefail
          find server -type f -name '*.php' -print0 | xargs -0 -n1 php -l
          php -r "new PDO('sqlite::memory:'); echo 'SQLite OK'.PHP_EOL;"

      - name: Build PHP panel DEB
        shell: bash
        run: bash server/build-deb.sh

      - name: Install Theos toolchain and SDK
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf "$THEOS"
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          test -x "$THEOS/toolchain/linux/iphone/bin/clang"
          test -n "$(find "$THEOS/sdks" -maxdepth 1 -type d -name '*.sdk' -print -quit)"

      - name: Build tweak DEB with retries
        shell: bash
        run: bash scripts/build.sh

      - name: Upload build files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GPSQ-${{ github.run_number }}
          path: |
            artifacts/*.deb
            artifacts/*.log
            artifacts/*SHA256SUMS.txt
            artifacts/BUILD_RESULT.txt
          if-no-files-found: warn
          retention-days: 30
