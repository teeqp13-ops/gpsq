name: 🔨 Build & Release gpsq DEB

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.mm'
      - '**.plist'
      - 'Makefile'
      - 'control'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      activation_code:
        description: '🔑 أدخل كود التفعيل لعرض الميزات'
        required: false
        default: ''

permissions:
  contents: read
  actions: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  GPSQ_API_BASE: https://ipa.p3nd.fun/server/api
  GPSQ_API_KEY: ${{ secrets.GPSQ_API_KEY }}
  REGISTRY: ghcr.io
  CI_COMMIT_SHA: ${{ github.sha }}

jobs:
  # 🎯 مرحلة التفعيل والتحقق
  activation-check:
    name: 🔐 التحقق من كود التفعيل
    runs-on: ubuntu-latest
    outputs:
      features_enabled: ${{ steps.check.outputs.enabled }}
      features_list: ${{ steps.check.outputs.features }}
      is_valid: ${{ steps.check.outputs.is_valid }}
    steps:
      - name: 🔑 فحص كود التفعيل
        id: check
        run: |
          ACTIVATION_CODE="${{ github.event.inputs.activation_code }}"
          
          # قائمة الأكواد المتاحة مع الميزات
          declare -A CODES
          CODES[GPSQ2024]="✨ الميزات الكاملة: Build Optimization + Security Scan + Advanced Reporting + Performance Metrics"
          CODES[ADVANCED]="🚀 الميزات المتقدمة: Security Scan + Advanced Reporting"
          CODES[BUILDER]="🔨 بناء محسّن: Build Optimization + Performance Metrics"
          CODES[SECURE]="🔒 أمان محسّن: Security Scan + Code Quality Check"
          
          if [ -n "$ACTIVATION_CODE" ]; then
            if [ -n "${CODES[$ACTIVATION_CODE]}" ]; then
              echo "enabled=true" >> $GITHUB_OUTPUT
              echo "is_valid=true" >> $GITHUB_OUTPUT
              echo "features=${CODES[$ACTIVATION_CODE]}" >> $GITHUB_OUTPUT
              
              echo "✅ كود التفعيل صحيح!"
              echo "🎁 الميزات المتاحة:"
              echo "${CODES[$ACTIVATION_CODE]}"
            else
              echo "enabled=false" >> $GITHUB_OUTPUT
              echo "is_valid=false" >> $GITHUB_OUTPUT
              echo "❌ كود التفعيل غير صحيح"
              echo "الأكواد المتاحة: GPSQ2024, ADVANCED, BUILDER, SECURE"
            fi
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "is_valid=false" >> $GITHUB_OUTPUT
            echo "ℹ️ لم يتم إدخال كود تفعيل"
            echo "الأكواس المتاحة:"
            echo "  • GPSQ2024 - الميزات الكاملة"
            echo "  • ADVANCED - الميزات المتقدمة"
            echo "  • BUILDER - بناء محسّن"
            echo "  • SECURE - أمان محسّن"
          fi

  # 📋 مرحلة الفحص المسبق
  pre-build-checks:
    name: ✅ الفحوصات المسبقة
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.version.outputs.version }}
      commit_author: ${{ steps.git.outputs.author }}
      commit_message: ${{ steps.git.outputs.message }}
    steps:
      - name: 📥 تحميل كود المشروع
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📊 استخراج معلومات النسخة
        id: version
        run: |
          VERSION=$(grep -oP 'Version: \K[0-9.]+' control 2>/dev/null || echo "0.0.0")
          BUILD_NUMBER=${{ github.run_number }}
          FULL_VERSION="${VERSION}-build.${BUILD_NUMBER}"
          
          echo "version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "📌 النسخة: $FULL_VERSION"

      - name: 🔍 استخراج معلومات Git
        id: git
        run: |
          AUTHOR=$(git log -1 --pretty=%an)
          MESSAGE=$(git log -1 --pretty=%s)
          
          echo "author=${AUTHOR}" >> $GITHUB_OUTPUT
          echo "message=${MESSAGE}" >> $GITHUB_OUTPUT
          
          echo "👤 المؤلف: $AUTHOR"
          echo "💬 الرسالة: $MESSAGE"

      - name: 🗂️ التحقق من بنية المشروع
        run: |
          echo "🔍 فحص ملفات المشروع..."
          
          REQUIRED_FILES=("Makefile" "control" "gpsq.mm" "gpsq.plist" "Filter.plist")
          
          ERROR_COUNT=0
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              FILE_SIZE=$(du -h "$file" | cut -f1)
              echo "✅ $file ($FILE_SIZE)"
            else
              echo "❌ مفقود: $file"
              ((ERROR_COUNT++))
            fi
          done
          
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "❌ فشل: $ERROR_COUNT ملف(ات) مفقودة"
            exit 1
          fi
          
          echo "✨ جميع الملفات موجودة ✓"

      - name: 🔐 التحقق من الأسرار والمتغيرات
        run: |
          echo "🔐 فحص المتغيرات البيئية..."
          
          if [ -z "$GPSQ_API_KEY" ]; then
            echo "⚠️ تحذير: السر GPSQ_API_KEY غير مُعيّن"
          else
            echo "✅ GPSQ_API_KEY معيّن بنجاح"
          fi
          
          if [ -z "$GPSQ_API_BASE" ]; then
            echo "❌ خطأ: قاعدة الـ API غير محددة"
            exit 1
          fi
          
          echo "✅ جميع المتغيرات المطلوبة موجودة"

  # 🔨 مرحلة البناء
  build:
    name: 🔨 بناء حزمة DEB
    needs: [pre-build-checks, activation-check]
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.build.outputs.duration }}
      deb_files: ${{ steps.verify.outputs.files }}
      total_size: ${{ steps.verify.outputs.total_size }}
    steps:
      - name: 📥 تحميل كود المشروع
        uses: actions/checkout@v4

      - name: 🛠️ تحضير بيئة Theos
        uses: Randomblock1/theos-action@v1

      - name: 🧹 تنظيف الملفات القديمة
        run: |
          echo "🧹 تنظيف البيئة..."
          make clean || true
          rm -rf build/ obj/ *.deb *.o
          echo "✅ تم التنظيف"

      - name: 🔐 التحقق من #error guard
        run: |
          echo "🔐 التحقق من حماية #error..."
          if grep -q '#error.*GPS_API_TOKEN.*must be defined' Sources/GPSApiLocal.mm; then
            echo "✅ #error guard موجود وصحيح"
          else
            echo "❌ #error guard مفقود أو معطل"
            exit 1
          fi

      - name: 🔨 بناء الحزمة
        id: build
        run: |
          echo "🔨 بدء عملية البناء..."
          START_TIME=$(date +%s)
          
          set -e
          
          make package FINALPACKAGE=1 \
            GPSQ_API_BASE="${GPSQ_API_BASE}" \
            GPSQ_API_KEY="${GPSQ_API_KEY}" 2>&1 | tee build.log
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          echo "duration=${DURATION}" >> $GITHUB_OUTPUT
          echo "✅ البناء اكتمل في ${DURATION} ثانية"

      - name: 📊 التحقق من المخرجات
        id: verify
        run: |
          echo "🔍 التحقق من ملفات البناء..."
          
          DEB_FILES=$(find . -type f -name "*.deb" -not -path "./.git/*")
          DEB_COUNT=$(echo "$DEB_FILES" | wc -l)
          
          if [ $DEB_COUNT -eq 0 ]; then
            echo "❌ خطأ: لم يتم إنشاء ملفات DEB"
            tail -50 build.log || true
            exit 1
          fi
          
          echo "files=${DEB_COUNT}" >> $GITHUB_OUTPUT
          
          echo "✅ تم إنشاء $DEB_COUNT ملف(ات) DEB:"
          
          TOTAL_SIZE=0
          while IFS= read -r deb; do
            if [ -n "$deb" ]; then
              SIZE=$(du -h "$deb" | cut -f1)
              SIZE_BYTES=$(du -b "$deb" | cut -f1)
              TOTAL_SIZE=$((TOTAL_SIZE + SIZE_BYTES))
              echo "  📦 $(basename $deb) - $SIZE"
            fi
          done <<< "$DEB_FILES"
          
          TOTAL_SIZE_MB=$((TOTAL_SIZE / 1024 / 1024))
          echo "total_size=${TOTAL_SIZE_MB}MB" >> $GITHUB_OUTPUT

  # 🔒 مرحلة الأمان (مع التفعيل)
  security-scan:
    name: 🔒 فحص الأمان
    needs: activation-check
    runs-on: ubuntu-latest
    if: needs.activation-check.outputs.is_valid == 'true'
    steps:
      - name: 📥 تحميل كود المشروع
        uses: actions/checkout@v4

      - name: 🚨 عرض الميزات المفعلة
        run: |
          echo "╔════════════════════════════════════════════╗"
          echo "║        ✨ الميزات المفعلة - الأمان         ║"
          echo "╚════════════════════════════════════════════╝"
          echo ""
          echo "${{ needs.activation-check.outputs.features_list }}"
          echo ""

      - name: 🔐 فحص البيانات الحساسة
        run: |
          echo "🔐 فحص الأمان المتقدم..."
          
          SCAN_FILES=("gpsq.mm" "gpsq.plist" "Filter.plist" "Makefile" "control")
          
          ISSUES_FOUND=0
          
          for file in "${SCAN_FILES[@]}"; do
            if [ -f "$file" ]; then
              if grep -iE "password|secret|apikey|token|auth|credential" "$file" 2>/dev/null | grep -v "GPSQ_API_KEY"; then
                echo "⚠️ تحذير: قد توجد بيانات حساسة في $file"
                ((ISSUES_FOUND++))
              fi
              
              if grep -E "TODO|FIXME|HACK|XXX|KLUDGE" "$file"; then
                echo "ℹ️ ملاحظة: وجدت علامات تطوير في $file"
              fi
            fi
          done
          
          if [ $ISSUES_FOUND -eq 0 ]; then
            echo "✅ لم يتم العثور على مشاكل أمان"
          fi

      - name: 📋 فحص جودة الكود المتقدم
        run: |
          echo "📋 فحص جودة الكود المتقدم..."
          
          STATS_FILE="code-stats.txt"
          {
            echo "=== تقرير جودة الكود المتقدم ==="
            echo "التاريخ: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            
            for file in gpsq.mm gpsq.plist Filter.plist; do
              if [ -f "$file" ]; then
                LINES=$(wc -l < "$file")
                WORDS=$(wc -w < "$file")
                CHARS=$(wc -c < "$file")
                
                echo "📄 $file"
                echo "   الأسطر: $LINES"
                echo "   الكلمات: $WORDS"
                echo "   الأحرف: $CHARS"
                
                # تحليل متقدم
                if grep -q "TODO" "$file"; then
                  TODO_COUNT=$(grep -c "TODO" "$file")
                  echo "   ⚠️ TODO: $TODO_COUNT"
                fi
                
                echo ""
              fi
            done
          } | tee "$STATS_FILE"

      - name: 📤 تحميل تقرير الأمان
        uses: actions/upload-artifact@v4
        with:
          name: security-report-advanced
          path: code-stats.txt
          retention-days: 30

  # 📊 مرحلة التقارير المتقدمة
  advanced-reports:
    name: 📊 التقارير المتقدمة
    needs: [build, pre-build-checks, activation-check]
    runs-on: ubuntu-latest
    if: needs.activation-check.outputs.is_valid == 'true'
    steps:
      - name: 📥 تحميل كود المشروع
        uses: actions/checkout@v4

      - name: 🚨 عرض الميزات المفعلة
        run: |
          echo "╔════════════════════════════════════════════╗"
          echo "║      ✨ الميزات المفعلة - التقارير       ║"
          echo "╚════════════════════════════════════════════╝"
          echo ""
          echo "${{ needs.activation-check.outputs.features_list }}"
          echo ""

      - name: 📋 إنشاء تقرير البناء المفصل
        run: |
          mkdir -p reports
          
          {
            echo "╔════════════════════════════════════════════╗"
            echo "║       📊 تقرير البناء الشامل المتقدم       ║"
            echo "╚════════════════════════════════════════════╝"
            echo ""
            echo "📌 معلومات البناء"
            echo "─────────────────────────────────────────"
            echo "النسخة: ${{ needs.pre-build-checks.outputs.build_version }}"
            echo "المؤلف: ${{ needs.pre-build-checks.outputs.commit_author }}"
            echo "الرسالة: ${{ needs.pre-build-checks.outputs.commit_message }}"
            echo ""
            echo "📦 ملفات المخرجات"
            echo "─────────────────────────────────────────"
            echo "عدد الملفات: ${{ needs.build.outputs.deb_files }}"
            echo "الحجم الكلي: ${{ needs.build.outputs.total_size }}"
            echo "وقت البناء: ${{ needs.build.outputs.build_time }} ثانية"
            echo ""
            echo "⏰ الطابع الزمني"
            echo "───────────────────────────────────���─────"
            echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
          } | tee reports/advanced-report.txt

      - name: 📤 تحميل التقارير
        uses: actions/upload-artifact@v4
        with:
          name: advanced-reports
          path: reports/
          retention-days: 30

  # 📤 مرحلة تجميع المخرجات
  collect-artifacts:
    name: 📤 تجميع المخرجات
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: 📥 تحميل كود المشروع
        uses: actions/checkout@v4

      - name: 🛠️ تحضير بيئة Theos
        uses: Randomblock1/theos-action@v1

      - name: 🔨 بناء الحزمة (مرة أخرى)
        run: |
          make clean || true
          make package FINALPACKAGE=1 \
            GPSQ_API_BASE="${GPSQ_API_BASE}" \
            GPSQ_API_KEY="${GPSQ_API_KEY}"

      - name: 📦 تجميع ملفات DEB
        run: |
          mkdir -p artifacts/debs artifacts/info
          
          find . -type f -name "*.deb" -not -path "./.git/*" | while read -r deb; do
            cp "$deb" artifacts/debs/
            
            BASENAME=$(basename "$deb")
            {
              echo "📦 $BASENAME"
              echo "الحجم: $(du -h "$deb" | cut -f1)"
              echo "MD5: $(md5sum "$deb" | cut -d' ' -f1)"
              echo "SHA256: $(sha256sum "$deb" | cut -d' ' -f1)"
              echo "تاريخ الإنشاء: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            } > "artifacts/info/${BASENAME}.info"
          done

      - name: 📤 تحميل ملفات DEB
        uses: actions/upload-artifact@v4
        with:
          name: gpsq-DEB-packages
          path: artifacts/debs/
          retention-days: 30

      - name: 📤 تحميل معلومات الملفات
        uses: actions/upload-artifact@v4
        with:
          name: deb-info
          path: artifacts/info/
          retention-days: 30

      - name: 📤 تحميل إلى خادم FTP
        if: success() && github.ref == 'refs/heads/main'
        run: |
          echo "📤 جاري تحضير التحميل إلى FTP..."
          
          # تثبيت أدوات FTP
          apt-get update -qq && apt-get install -y -qq lftp
          
          # إعداد ملف البيانات
          SCRIPT_FILE="/tmp/ftp_upload.sh"
          cat > "$SCRIPT_FILE" << 'EOF'
          #!/bin/bash
          # تحميل آمن إلى FTP
          lftp -e "
            set ftp:ssl-allow false
            set net:max-retries 3
            set net:timeout 10
            mirror -R --verbose artifacts/debs/ ./public_html/packages/
            bye
          " -u "$FTP_USER" ftp://$FTP_HOST:$FTP_PORT
          EOF
          
          chmod +x "$SCRIPT_FILE"
          
          # تشغيل البرنامج مع المتغيرات المحمية
          FTP_USER="${{ secrets.FTP_USERNAME }}" \
          FTP_HOST="82.198.229.59" \
          FTP_PORT="21" \
          bash "$SCRIPT_FILE" 2>&1 || echo "⚠️ تنبيه: قد يكون FTP غير متاح حالياً"
          
          echo "✅ محاولة التحميل اكتملت"
        continue-on-error: true

  # ✅ الملخص النهائي
  summary:
    name: ✅ الملخص النهائي
    needs: [pre-build-checks, build, activation-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 📋 عرض الملخص
        run: |
          echo "╔════════════════════════════════════════════════╗"
          echo "║       ✅ ملخص البناء النهائي                  ║"
          echo "╚════════════════════════════════════════════════╝"
          echo ""
          
          if [ "${{ needs.activation-check.outputs.is_valid }}" == "true" ]; then
            echo "🎁 الميزات المفعلة:"
            echo "${{ needs.activation-check.outputs.features_list }}"
            echo ""
          else
            echo "ℹ️ للتفعيل والحصول على ميزات إضافية:"
            echo "   استخدم أحد الأكواد التالية:"
            echo "   • GPSQ2024 - الميزات الكاملة"
            echo "   • ADVANCED - الميزات المتقدمة"
            echo "   • BUILDER - بناء محسّن"
            echo "   • SECURE - أمان محسّن"
            echo ""
          fi
          
          echo "📌 معلومات البناء:"
          echo "  النسخة: ${{ needs.pre-build-checks.outputs.build_version }}"
          echo "  المؤلف: ${{ needs.pre-build-checks.outputs.commit_author }}"
          echo ""
          echo "📊 الإحصائيات:"
          echo "  ملفات DEB: ${{ needs.build.outputs.deb_files }}"
          echo "  الحجم الكلي: ${{ needs.build.outputs.total_size }}"
          echo "  وقت البناء: ${{ needs.build.outputs.build_time }} ثانية"
          echo ""
          echo "🎯 النتائج:"
          echo "  ✅ الفحوصات المسبقة: نجحت"
          echo "  ✅ البناء: نجح"
          if [ "${{ needs.activation-check.outputs.is_valid }}" == "true" ]; then
            echo "  ✅ فحص الأمان: مفعّل"
            echo "  ✅ التقارير المتقدمة: مفعّلة"
          else
            echo "  ℹ️ فحص الأمان: معطّل (قم بالتفعيل)"
            echo "  ℹ️ التقارير المتقدمة: معطّلة (قم بالتفعيل)"
          fi
          echo ""
          echo "✨ اكتمل البناء!"
