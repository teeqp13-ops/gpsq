name: Build gpsq DEB

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build gpsq DEB
    runs-on: ubuntu-latest
    env:
      GPSQ_API_BASE: https://ipa.p3nd.fun/server/api
      GPSQ_API_KEY: ${{ secrets.GPSQ_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Theos
        uses: Randomblock1/theos-action@v1

      - name: Verify project files
        run: |
          set -e
          echo "🔍 التحقق من ملفات المشروع..."
          pwd
          ls -lah
          
          # التحقق من الملفات المطلوبة
          required_files=("Makefile" "control" "gpsq.mm" "gpsq.plist" "Filter.plist")
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ خطأ: الملف المطلوب '$file' غير موجود"
              exit 1
            fi
            echo "✅ تم العثور على: $file"
          done
          
          echo "✨ جميع ملفات المشروع موجودة وجاهزة"
          
          # التحقق من السر
          if [ -z "$GPSQ_API_KEY" ]; then
            echo "⚠️ تحذير: السر GPSQ_API_KEY غير مُعيّن"
            echo "::warning::Activation requests will be rejected by the server"
          else
            echo "✅ تم تعيين GPSQ_API_KEY"
          fi

      # ✨ ميزة جديدة: فحص الكود الثابت
      - name: Code Quality Check
        run: |
          echo "🔬 فحص جودة الكود..."
          
          # فحص الملفات الرئيسية
          for file in gpsq.mm gpsq.plist Filter.plist; do
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              echo "📄 $file: $lines سطر"
              
              # فحص الأخطاء الشائعة
              if grep -q "TODO\|FIXME\|BUG" "$file"; then
                echo "⚠️ تحذير: وجدت TODO/FIXME/BUG في $file"
              fi
            fi
          done
          
          echo "✅ اكتمل فحص جودة الكود"

      - name: Build package
        run: |
          set -e
          echo "🔨 بدء البناء..."
          START_TIME=$(date +%s)
          
          # تنظيف الملفات القديمة
          make clean || true
          
          # بناء الحزمة
          echo "📦 تجميع حزمة DEB..."
          make package FINALPACKAGE=1 \
            GPSQ_API_BASE="$GPSQ_API_BASE" \
            GPSQ_API_KEY="$GPSQ_API_KEY"
          
          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))
          echo "✅ تم البناء بنجاح (الوقت: ${BUILD_TIME}s)"
          echo "BUILD_TIME=${BUILD_TIME}" >> $GITHUB_ENV
        
      - name: Verify build output
        if: success()
        run: |
          echo "🔍 التحقق من ملفات البناء..."
          deb_count=$(find . -type f -name "*.deb" -not -path "./.git/*" | wc -l)
          
          if [ "$deb_count" -eq 0 ]; then
            echo "❌ خطأ: لم يتم إنشاء ملفات DEB"
            exit 1
          fi
          
          echo "✅ تم إنشاء $deb_count ملف(ات) DEB"
          
          # ✨ ميزة جديدة: فحص حجم الملفات
          echo ""
          echo "📊 تقرير أحجام الملفات:"
          find . -type f -name "*.deb" -not -path "./.git/*" | while read deb; do
            size=$(du -h "$deb" | cut -f1)
            echo "  📦 $(basename $deb): $size"
          done

      # ✨ ميزة جديدة: فحص الأمان
      - name: Security Scan
        run: |
          echo "🔐 فحص الأمان..."
          
          # فحص المفاتيح الخاصة
          if grep -r "PRIVATE\|SECRET\|PASSWORD" --include="*.mm" --include="*.plist" . 2>/dev/null; then
            echo "⚠️ تحذير: قد تكون هناك بيانات حساسة في الكود"
          else
            echo "✅ لم يتم العثور على بيانات حساسة"
          fi
          
          # فحص الملفات المريبة
          echo "✅ اكتمل فحص الأمان"

      - name: Collect build artifacts
        if: always()
        run: |
          mkdir -p artifacts
          
          echo "📋 جمع معلومات البناء..."
          {
            echo "================================"
            echo "     📊 تقرير البناء الكامل     "
            echo "================================"
            echo ""
            echo "=== معلومات البناء ==="
            echo "التاريخ: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "الفرع: $(git rev-parse --abbrev-ref HEAD)"
            echo "آخر التزام: $(git log -1 --pretty=%H)"
            echo "مؤلف: $(git log -1 --pretty=%an)"
            echo "الرسالة: $(git log -1 --pretty=%s)"
            echo ""
            echo "=== معلومات النظام ==="
            echo "النظام: $(uname -a)"
            echo "مساحة القرص: $(df -h / | tail -1)"
            echo ""
            echo "=== الملفات الموجودة ==="
          } > artifacts/build-info.txt
          
          pwd >> artifacts/build-info.txt
          echo "" >> artifacts/build-info.txt
          find . -maxdepth 4 -type f -not -path "./.git/*" | sort >> artifacts/build-info.txt
          
          echo "" >> artifacts/build-info.txt
          echo "=== ملفات DEB المُنتجة ===" >> artifacts/build-info.txt
          
          # ✨ ميزة جديدة: معلومات مفصلة عن DEB
          find . -type f -name "*.deb" -not -path "./.git/*" | while read -r deb; do
            echo "نسخ: $deb"
            cp -v "$deb" artifacts/
            
            # حفظ معلومات الملف
            {
              echo "📦 $(basename $deb)"
              echo "  الحجم: $(du -h "$deb" | cut -f1)"
              echo "  وقت التعديل: $(stat -f '%Sm' "$deb" 2>/dev/null || stat --format='%y' "$deb")"
              echo "  MD5: $(md5sum "$deb" | cut -d' ' -f1)"
            } >> artifacts/deb-info.txt
            
            echo "$deb" >> artifacts/deb-list.txt
          done
          
          # عرض المعلومات
          echo "" >> artifacts/build-info.txt
          echo "=== حجم الملفات ===" >> artifacts/build-info.txt
          ls -lh artifacts/ >> artifacts/build-info.txt
          
          echo "✅ تم جمع Artifacts"

      - name: Upload DEB Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpsq-DEB-Packages
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

      # ✨ ميزة جديدة: إرسال إخطارات
      - name: Send Notifications
        if: always()
        run: |
          echo "📢 إرسال الإخطارات..."
          
          STATUS=${{ job.status }}
          
          if [ "$STATUS" == "success" ]; then
            echo "✅ البناء نجح بنجاح!"
            echo "📦 الحزم جاهزة للتحميل"
            echo "⏱️ وقت البناء: ${{ env.BUILD_TIME }}s"
          elif [ "$STATUS" == "failure" ]; then
            echo "❌ البناء فشل"
            echo "🔧 يرجى التحقق من السجلات"
            exit 1
          else
            echo "⚠️ البناء متوقف"
          fi

      # ✨ ميزة جديدة: ملخص البناء
      - name: Build Summary
        if: always()
        run: |
          echo "📝 ملخص البناء النهائي:"
          echo ""
          echo "=== الإحصائيات ==="
          
          if [ -f artifacts/deb-list.txt ]; then
            deb_files=$(wc -l < artifacts/deb-list.txt)
            total_size=$(du -sh artifacts/ | cut -f1)
            echo "✅ عدد ملفات DEB: $deb_files"
            echo "📊 الحجم الكلي: $total_size"
          fi
          
          echo ""
          echo "=== تفاصيل السجل ==="
          if [ -f artifacts/build-info.txt ]; then
            head -20 artifacts/build-info.txt
          fi
